<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GLSL Ray Marcher</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; background:#000; overflow:hidden; }
    canvas { display:block; width:100%; height:100%; }

    #hud {
      position:fixed; top:20px; left:20px;
      font-family:'Courier New',monospace;
      color:rgba(100,220,255,.55);
      font-size:10px; letter-spacing:.18em;
      line-height:2; text-transform:uppercase;
      pointer-events:none;
    }
    #hud .title {
      color:rgba(100,220,255,.95);
      font-size:12px; font-weight:bold; margin-bottom:4px;
    }
    #hud .fps { margin-top:4px; color:rgba(100,220,255,.3); }

    #legend {
      position:fixed; top:20px; right:20px;
      font-family:'Courier New',monospace;
      font-size:9px; letter-spacing:.1em;
      line-height:2.4; text-transform:uppercase;
      text-align:right; pointer-events:none;
      color:rgba(255,255,255,.28);
    }

    #hint {
      position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
      font-family:'Courier New',monospace;
      font-size:9px; letter-spacing:.22em;
      color:rgba(150,80,255,.4); text-transform:uppercase;
      pointer-events:none; white-space:nowrap;
    }

    #err {
      display:none; position:fixed; inset:0;
      align-items:center; justify-content:center;
      color:#f66; font-family:monospace; font-size:14px;
      background:#000; padding:32px; text-align:center;
      line-height:1.8;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div id="hud">
  <div class="title">◈ GLSL Ray Marcher</div>
  <div>Pure WebGL2 · No Libraries</div>
  <div>120-Step SDF · Soft Shadows</div>
  <div>fBm Terrain · AO · PBR</div>
  <div class="fps" id="fps">-- fps</div>
</div>

<div id="legend">
  <div><span style="color:#64dcff">◈</span> Iridescent Orb</div>
  <div><span style="color:#eab832">◈</span> Gold Torus</div>
  <div><span style="color:#0dc8f5">◈</span> Crystal Octahedra</div>
  <div><span style="color:#a050ff">◈</span> Energy Rings</div>
  <div><span style="color:#9030b0">◈</span> Metal Shards</div>
  <div><span style="color:#445">◈</span> Obsidian Monolith</div>
</div>

<div id="hint">Move Mouse to Orbit · Touch Supported</div>
<div id="err"></div>

<script>
const VS = `#version 300 es
in vec2 a;
void main(){ gl_Position = vec4(a,0.0,1.0); }`;

const FS = `#version 300 es
precision highp float;
uniform vec2  uRes;
uniform float uTime;
uniform vec2  uMouse;
out vec4 fragColor;

#define PI         3.14159265359
#define MAX_STEPS  120
#define MAX_DIST   80.0
#define SURF       0.002

/* ═══ HASH / NOISE ════════════════════════════════════ */
float h21(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }

float vnoise(vec2 p){
  vec2 i=floor(p), f=fract(p), u=f*f*(3.-2.*f);
  return mix(mix(h21(i),h21(i+vec2(1,0)),u.x),
             mix(h21(i+vec2(0,1)),h21(i+vec2(1,1)),u.x),u.y);
}
float fbm(vec2 p){
  float v=0., a=.5;
  mat2 R=mat2(.8,.6,-.6,.8);
  for(int i=0;i<5;i++){ v+=a*vnoise(p); p=R*p*2.1+vec2(1.7,9.2); a*=.5; }
  return v;
}

/* ═══ SDFs ════════════════════════════════════════════ */
float sdSphere(vec3 p,float r){ return length(p)-r; }

float sdTorus(vec3 p,float R2,float r){
  return length(vec2(length(p.xz)-R2, p.y))-r;
}
float sdBox(vec3 p,vec3 b){
  vec3 q=abs(p)-b;
  return length(max(q,0.))+min(max(q.x,max(q.y,q.z)),0.);
}
float sdOcta(vec3 p,float s){
  p=abs(p); return (p.x+p.y+p.z-s)*.57735027;
}

/* ═══ SCENE ═══════════════════════════════════════════
   Returns vec2(distance, materialID)
   mat IDs: 1=terrain, 2=orb, 3=torus, 4=crystal,
            5=monolith, 6=shard, 7=ring
═══════════════════════════════════════════════════════ */
vec2 scene(vec3 p){
  float t = uTime;

  /* --- terrain (flat-ish lava plain) --- */
  float th = fbm(p.xz*0.07 + vec2(t*0.009,0.)) * 1.8
           + fbm(p.xz*0.18) * 0.6 - 0.3;
  th = clamp(th, -0.5, 2.2);               /* HARD cap: max height 2.2 */
  vec2 res = vec2((p.y - th)*0.55, 1.0);   /* conservative step */

  /* --- central orb (hovers at y=3.0) --- */
  float orb = sdSphere(p - vec3(0., 3.0+sin(t*0.8)*0.35, 0.),
                        1.0 + sin(t*2.0)*0.04);
  if(orb < res.x) res = vec2(orb, 2.0);

  /* --- orbiting gold torus --- */
  float a1=t*0.35, ca=cos(a1), sa=sin(a1);
  vec3 tp = p - vec3(sin(a1)*5.5, 2.8+cos(a1*0.5)*0.4, cos(a1)*5.5);
  vec3 tr  = vec3(tp.x*ca+tp.z*sa, tp.y, -tp.x*sa+tp.z*ca);
  float tor = sdTorus(tr, 1.05, 0.22);
  if(tor < res.x) res = vec2(tor, 3.0);

  /* --- 6 crystal octahedra on a ring --- */
  for(int i=0;i<6;i++){
    float b  = float(i)/6.*PI*2. + t*0.20;
    vec3 ep  = p - vec3(sin(b)*5.8, 1.5+sin(t+float(i)*1.1)*0.5, cos(b)*5.8);
    float oc = sdOcta(ep, 0.40+sin(t*1.6+float(i)*0.9)*0.05);
    if(oc < res.x) res = vec2(oc, 4.0);
  }

  /* --- obsidian monolith (grounded) --- */
  vec3 mp = p - vec3(4.0, 1.4, -3.0);
  float mn = sdBox(mp, vec3(0.28, 2.8, 0.13));
  if(mn < res.x) res = vec2(mn, 5.0);

  /* --- 8 rotating metal shards (outer ring) --- */
  for(int i=0;i<8;i++){
    float b  = float(i)/8.*PI*2. + t*0.12;
    float rt = b + t*0.5;
    vec3 bp  = p - vec3(sin(b)*9.0, 0.8+sin(t*0.6+float(i)*0.8)*0.3, cos(b)*9.0);
    vec3 br  = vec3(bp.x*cos(rt)+bp.z*sin(rt), bp.y, -bp.x*sin(rt)+bp.z*cos(rt));
    float sh = sdBox(br, vec3(0.14, 0.55, 0.11));
    if(sh < res.x) res = vec2(sh, 6.0);
  }

  /* --- 3 energy rings around orb --- */
  for(int i=0;i<3;i++){
    float fi = float(i);
    float a2 = t*(0.55+fi*0.15) + fi*PI*0.6;
    vec3 rp  = p - vec3(0., 3.0+fi*0.9+sin(t*0.5+fi)*0.18, 0.);
    float ct = cos(a2), st = sin(a2);
    vec3 rr  = vec3(rp.x*ct+rp.y*st, -rp.x*st+rp.y*ct, rp.z);
    float rn = sdTorus(rr, 0.52+fi*0.44, 0.042);
    if(rn < res.x) res = vec2(rn, 7.0);
  }

  return res;
}

float sceneDist(vec3 p){ return scene(p).x; }

/* ═══ NORMAL (tetrahedron) ═══════════════════════════ */
vec3 calcNormal(vec3 p){
  const float e = 0.0004;
  const vec2  k = vec2(1.,-1.);
  return normalize(
    k.xyy*sceneDist(p+k.xyy*e) +
    k.yyx*sceneDist(p+k.yyx*e) +
    k.yxy*sceneDist(p+k.yxy*e) +
    k.xxx*sceneDist(p+k.xxx*e));
}

/* ═══ SOFT SHADOW ════════════════════════════════════ */
float softShadow(vec3 ro,vec3 rd,float tmin,float tmax,float k){
  float res=1., t=tmin, ph=1e10;
  for(int i=0;i<48;i++){
    float h = sceneDist(ro+rd*t);
    if(h<0.001) return 0.;
    float y  = h*h/(2.*ph);
    float dv = sqrt(h*h-y*y);
    res = min(res, k*dv/max(0.,t-y));
    ph=h; t+=clamp(h,0.015,0.5);
    if(res<0.001||t>tmax) break;
  }
  return clamp(res,0.,1.);
}

/* ═══ AMBIENT OCCLUSION ══════════════════════════════ */
float calcAO(vec3 pos,vec3 nor){
  float occ=0., sca=1.;
  for(int i=0;i<5;i++){
    float h = 0.01+0.18*float(i)/4.;
    occ += (h-sceneDist(pos+h*nor))*sca;
    sca *= 0.8;
  }
  return clamp(1.-1.8*occ,0.,1.);
}

/* ═══ SKY ════════════════════════════════════════════ */
vec3 sky(vec3 rd){
  /* vivid deep-space gradient — guaranteed non-black */
  vec3 c = mix(vec3(0.08,0.03,0.18),   /* horizon: rich violet */
               vec3(0.01,0.005,0.04),  /* zenith: deep space */
               clamp(rd.y*0.8+0.2, 0., 1.));

  /* nebula — always visible regardless of y */
  c += vec3(0.22,0.04,0.38)*fbm(rd.xz*1.5+vec2(uTime*0.02,0.))*max(0.,rd.y+0.3);
  c += vec3(0.0,0.10,0.30)*fbm(rd.xz*2.8+vec2(3.1,uTime*0.012))*max(0.,rd.y+0.3);

  /* aurora band near horizon */
  float h = exp(-abs(rd.y)*4.5);
  c += h*vec3(0.18,0.05,0.55)*(sin(rd.x*3.2+uTime*0.25)*0.5+0.5);
  c += h*vec3(0.0,0.18,0.32)*(cos(rd.x*5.0-uTime*0.15)*0.5+0.5);

  /* stars */
  float s = h21(floor(rd.xz/max(0.001,abs(rd.y)+0.001)*50.));
  c += step(0.960,s)*(0.6+0.4*sin(uTime*2.5+s*160.))*vec3(0.8,0.9,1.0)*step(0.,rd.y);

  /* sun */
  vec3 sun = normalize(vec3(sin(uTime*0.12)*2., 2.0, cos(uTime*0.12)*2.));
  float sd = max(0., dot(rd, sun));
  c += pow(sd,80.)*vec3(1.0,0.90,0.65)*2.0;
  c += pow(sd,10.)*vec3(0.50,0.22,0.04)*0.7;

  return c;
}

/* ═══ MATERIALS / SHADING ════════════════════════════ */
vec3 shade(vec3 pos, vec3 nor, vec3 rd, float mat){
  vec3 sun    = normalize(vec3(sin(uTime*0.12)*2., 2.0, cos(uTime*0.12)*2.));
  vec3 sunCol = vec3(1.0, 0.90, 0.65);

  float diff = max(0., dot(nor, sun));
  float shad = softShadow(pos+nor*0.004, sun, 0.04, 18., 14.);
  float occ  = calcAO(pos, nor);
  float fres = pow(clamp(1.-dot(nor,-rd),0.,1.), 4.);
  float spec = pow(max(0., dot(reflect(-sun,nor),-rd)), 64.);

  vec3  mc  = vec3(1.);
  vec3  em  = vec3(0.);
  float rg  = 0.85;
  float mt  = 0.0;

  int m = int(mat);

  if(m == 1){
    /* basalt + orange/red lava cracks */
    vec3 rock = mix(vec3(0.05,0.06,0.08), vec3(0.09,0.04,0.02), fbm(pos.xz*0.35));
    float c1 = pow(max(0.,1.-abs(fract(fbm(pos.xz*0.18+uTime*0.014)*4.)-0.5)*2.0), 4.);
    float c2 = pow(max(0.,1.-abs(fract(fbm(pos.xz*0.35-uTime*0.008)*3.)-0.5)*2.0), 3.);
    em   = (vec3(1.0,0.30,0.0)*c1 + vec3(0.9,0.05,0.0)*c2) * 1.5;
    mc   = rock; spec *= 0.2; rg = 0.92;

  } else if(m == 2){
    /* rainbow iridescent orb */
    mc  = 0.5+0.5*cos(6.2832*(vec3(0.0,0.33,0.67)+dot(-rd,nor)*3.0+uTime*0.5));
    mt  = 0.6; rg = 0.05; spec *= 8.;

  } else if(m == 3){
    /* brushed gold torus */
    mc = vec3(0.95,0.76,0.14); mt=1.; rg=0.14; spec*=10.;

  } else if(m == 4){
    /* cyan glowing crystals */
    mc = vec3(0.04,0.85,0.98); rg=0.07; spec*=9.;
    em = mc*0.55*(0.5+0.5*sin(uTime*3.0+pos.y*10.));

  } else if(m == 5){
    /* obsidian monolith */
    mc=vec3(0.01,0.008,0.016); mt=0.97; rg=0.02; spec*=16.;

  } else if(m == 6){
    /* deep violet metal shards */
    mc=vec3(0.42,0.06,0.65); mt=0.85; rg=0.20; spec*=7.;

  } else {
    /* hot plasma energy rings */
    mc  = vec3(0.5,0.95,1.0); rg=0.01;
    em  = mc*2.5*(0.5+0.5*sin(uTime*5.0+pos.y*16.));
  }

  vec3 col = vec3(0.05,0.02,0.10)*occ;              /* ambient */
  col += mc*sunCol*diff*shad;                        /* diffuse */
  col += mix(vec3(0.04),mc,mt)*spec*shad;            /* specular */
  col += mc*max(0.,dot(nor,-sun))*0.09*vec3(0.2,0.1,0.4); /* fill */
  col += fres*vec3(0.3,0.12,0.6)*occ;               /* rim */
  col += sky(reflect(rd,nor))*mix(vec3(0.04),mc,mt)*fres*(1.-rg); /* env */
  col += em;

  return col;
}

/* ═══ CAMERA ═════════════════════════════════════════ */
mat3 lookAt(vec3 ro, vec3 ta){
  vec3 f=normalize(ta-ro), r=normalize(cross(f,vec3(0,1,0)));
  return mat3(r, cross(r,f), f);
}

/* ═══ MAIN ═══════════════════════════════════════════ */
void main(){
  vec2 uv = (gl_FragCoord.xy*2.0 - uRes) / uRes.y;

  /* camera: mouse X = orbit azimuth, mouse Y = elevation  */
  float mx  = (uMouse.x - 0.5)*PI*2.0;
  float my  = clamp(uMouse.y, 0.10, 0.82);
  float cr  = 18.0;
  /* Camera Y is guaranteed at least 6.0 — well above terrain max 2.2 */
  vec3 ro = vec3(
    sin(mx)*cr*cos(my*PI*0.5),
    sin(my*PI*0.5)*cr*0.6 + 6.0,
    cos(mx)*cr*cos(my*PI*0.5)
  );
  vec3 ta  = vec3(0.0, 1.5, 0.0);
  mat3 cam = lookAt(ro, ta);
  vec3 rd  = cam * normalize(vec3(uv, 1.85));

  /* ── ray march ── */
  float t = 0.05;
  float matID = -1.0;
  for(int i=0; i<MAX_STEPS; i++){
    vec2 h = scene(ro + rd*t);
    if(h.x < SURF*(1.0+t*0.03)){
      matID = h.y;
      break;
    }
    if(t > MAX_DIST) break;
    t += h.x;
  }

  /* ── colour ── */
  vec3 col;
  if(matID < 0.5){
    col = sky(rd);
  } else {
    vec3 pos = ro + rd*t;
    vec3 nor = calcNormal(pos);
    col = shade(pos, nor, rd, matID);
    /* atmospheric haze — fades to sky, not to black */
    float fog = 1.0 - exp(-t*0.008);
    col = mix(col, sky(rd)*0.7, fog);
  }

  /* ACES filmic tone-map */
  col = (col*(2.51*col+0.03)) / (col*(2.43*col+0.59)+0.14);
  col = clamp(col, 0., 1.);

  /* gamma 2.2 */
  col = pow(col, vec3(1.0/2.2));

  /* vignette */
  vec2 q = gl_FragCoord.xy / uRes;
  col *= 0.5 + 0.5*pow(16.*q.x*q.y*(1.-q.x)*(1.-q.y), 0.14);

  /* chromatic aberration */
  float ca = length(uv)*0.003;
  col.r *= 1.0+ca; col.b *= 1.0-ca*0.7;

  /* film grain */
  col += 0.010*(h21(gl_FragCoord.xy + uTime) - 0.5);

  fragColor = vec4(col, 1.0);
}`;

/* ─── WebGL setup ─────────────────────────────────── */
const canvas  = document.getElementById('c');
const errDiv  = document.getElementById('err');
const fpsEl   = document.getElementById('fps');
const mouse   = [0.5, 0.38];

function fatal(msg){
  errDiv.style.display = 'flex';
  errDiv.textContent   = '⚠ ' + msg;
}

const gl = canvas.getContext('webgl2');
if(!gl){ fatal('WebGL2 is not supported in this browser.'); }
else { start(gl); }

function mkShader(gl, src, type){
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    throw new Error(gl.getShaderInfoLog(s));
  return s;
}

function start(gl){
  let prog;
  try {
    prog = gl.createProgram();
    gl.attachShader(prog, mkShader(gl, VS, gl.VERTEX_SHADER));
    gl.attachShader(prog, mkShader(gl, FS, gl.FRAGMENT_SHADER));
    gl.linkProgram(prog);
    if(!gl.getProgramParameter(prog, gl.LINK_STATUS))
      throw new Error(gl.getProgramInfoLog(prog));
  } catch(e){ fatal(e.message); return; }

  /* fullscreen quad */
  const vao = gl.createVertexArray(); gl.bindVertexArray(vao);
  const buf = gl.createBuffer();      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const loc = gl.getAttribLocation(prog, 'a');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

  const uRes   = gl.getUniformLocation(prog, 'uRes');
  const uTime  = gl.getUniformLocation(prog, 'uTime');
  const uMouse = gl.getUniformLocation(prog, 'uMouse');

  /* resize */
  function resize(){
    const pr = Math.min(window.devicePixelRatio || 1, 1.5);
    canvas.width  = window.innerWidth  * pr;
    canvas.height = window.innerHeight * pr;
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  resize();
  window.addEventListener('resize', resize);

  /* input */
  window.addEventListener('mousemove', e => {
    mouse[0] = e.clientX / window.innerWidth;
    mouse[1] = 1 - e.clientY / window.innerHeight;
  });
  window.addEventListener('touchmove', e => {
    const t = e.touches[0];
    mouse[0] = t.clientX / window.innerWidth;
    mouse[1] = 1 - t.clientY / window.innerHeight;
  }, { passive: true });

  /* render loop */
  let fpsFrames = 0, fpsLast = performance.now();
  const t0 = performance.now();

  function frame(now){
    const t = (now - t0) / 1000;
    gl.useProgram(prog);
    gl.bindVertexArray(vao);
    gl.uniform2f(uRes,   canvas.width, canvas.height);
    gl.uniform1f(uTime,  t);
    gl.uniform2f(uMouse, mouse[0], mouse[1]);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    fpsFrames++;
    if(now - fpsLast > 700){
      fpsEl.textContent = Math.round(fpsFrames*1000/(now-fpsLast)) + ' fps';
      fpsFrames = 0; fpsLast = now;
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
</script>
</body>
</html>
